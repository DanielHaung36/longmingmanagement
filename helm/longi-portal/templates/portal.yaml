apiVersion: apps/v1
kind: Deployment
metadata:
  name: longi-portal
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.portal.replicas }}
  selector:
    matchLabels:
      app: longi-portal
  template:
    metadata:
      labels:
        app: longi-portal
    spec:
      containers:
        - name: portal
          image: {{ .Values.portal.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.portal.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.portal.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.portal.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: longi-portal
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: longi-portal
  ports:
    - port: 80
      targetPort: {{ .Values.portal.port }}
      protocol: TCP
