version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: longi_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superadminpass
      POSTGRES_DB: longinventory
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - longinet

  backend:
    image: longi-backend:latest
    container_name: longi_backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - longinet

  frontend:
    image: longi-frontend:latest
    container_name: longi_frontend
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./backend/uploads:/app/uploads        # 让 nginx 也能访问上传目录
    networks:
      - longinet
    depends_on:
      - backend


networks:
  longinet:             # ← 这段一定要有
